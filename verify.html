<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify — AllProGamerz</title>
  <link rel="stylesheet" href="styles/verify.css">
</head>
<body>
  <div class="card">
    <div class="logo">AP<span>G</span></div>
    <h1>Verify your account</h1>
    <p>We sent a code to<br><span class="email-display" id="emailTarget">your email</span></p>

    <input type="text" id="pinInput" class="pin-input" placeholder="0000" maxlength="4" autocomplete="off">

    <button class="btn btn-primary" id="verifyBtn">Verify</button>
    <div class="status-msg" id="statusMessage"></div>
  </div>

  <script>
    const status = document.getElementById('statusMessage');
    const emailTarget = document.getElementById('emailTarget');
    const pendingEmail = sessionStorage.getItem('pending_verification_email');

    if (pendingEmail) {
      emailTarget.innerText = pendingEmail;
    } else {
      status.innerHTML = "No email found. <a href='signup.html' style='color:var(--accent);'>Sign up again</a>.";
      document.getElementById('verifyBtn').disabled = true;
    }

    document.getElementById('verifyBtn').addEventListener('click', () => {
      const pin = document.getElementById('pinInput').value;
      if (pin.length !== 4) {
        status.innerText = 'Enter a 4-digit code.';
        status.style.color = '#ef4444';
        return;
      }

      status.innerText = 'Verifying...';
      status.style.color = '#8888a0';

      fetch('https://apg-api.vercel.app/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: pendingEmail, code: pin })
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          status.innerText = 'Verified!';
          status.style.color = '#22c55e';
          sessionStorage.removeItem('pending_verification_email');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          status.innerText = data.message;
          status.style.color = '#ef4444';
        }
      })
      .catch(() => {
        status.innerText = 'Network error.';
        status.style.color = '#ef4444';
      });
    });
  </script>
</body>
</html>
