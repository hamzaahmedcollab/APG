<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllProGamerz — Dashboard</title>
  <link rel="icon" href="photo.png">
  <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>

<header>
  <h1>AP<span>G</span></h1>
  <button class="btn btn-danger" id="logoutBtn">Sign out</button>
</header>

<div class="nav-bar">
  <a href="Games.html">Games</a>
  <a href="#challenge">Challenge</a>
  <a href="#prize">Prizes</a>
  <a href="#profile">Profile</a>
  <a href="#request">Request</a>
  <a href="#contact">Contact</a>
</div>

<div id="mainWorkspace" class="container" style="display: none;">

  <section id="games">
    <h2>Games</h2>
    <a href="Games.html" class="btn btn-primary">Browse games</a>
  </section>

  <section id="challenge">
    <h2>Weekly challenge</h2>
    <div class="form-group">
      <label for="challengeText">Describe your proof</label>
      <textarea id="challengeText" rows="3"></textarea>
    </div>
    <button class="btn btn-primary" id="challengeBtn">Submit</button>
    <p class="status" id="challengeStatus"></p>
  </section>

  <section id="prize">
    <h2>Prize alerts</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Winners get free custom websites.</p>
  </section>

  <section id="profile">
    <h2>Profile</h2>
    <button class="btn btn-ghost" id="viewProfileBtn">View profile</button>
    <div id="profileSection">
      <p id="profileInfo">Loading...</p>
      <a class="btn btn-ghost" href="https://whatsapp.com" target="_blank" style="margin-top: 12px;">Invite friends</a>
      <div id="editProfile">
        <h3>Edit profile</h3>
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="editFirstName" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" id="editLastName" placeholder="Last name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" disabled>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="editPhone" placeholder="Phone">
        </div>
        <button class="btn btn-primary" id="saveProfileBtn">Save</button>
        <p class="status" id="editStatus"></p>
      </div>
    </div>
  </section>

  <section id="request">
    <h2>Request a custom website</h2>
    <div class="form-group">
      <label for="Prompt">Describe what you want</label>
      <textarea id="Prompt" rows="4" placeholder="Layout, theme, pages..."></textarea>
    </div>
    <button class="btn btn-primary" id="Btn">Submit</button>
    <p class="status" id="Status"></p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <a class="btn btn-ghost" href="https://wa.me" target="_blank">WhatsApp</a>
  </section>

</div>

<footer>&copy; 2026 AllProGamerz</footer>

<script>
const token = sessionStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

let authenticatedUser = null;

function verifySession() {
  fetch('https://apg-api.vercel.app/api/check-session', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (data && data.status === 'authenticated') {
        authenticatedUser = data.user;
        document.getElementById('mainWorkspace').style.display = 'block';
      }
    })
    .catch(() => { window.location.href = 'login.html'; });
}

verifySession();

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('token');
  window.location.href = 'login.html';
});

function populateProfileUI() {
  if (!authenticatedUser) {
    document.getElementById('profileInfo').innerText = 'Session lost.';
    return;
  }
  document.getElementById('profileInfo').innerHTML =
    'Email: ' + authenticatedUser.email + '<br>' +
    'Verified: ' + (authenticatedUser.verified ? 'yes' : 'no');
  document.getElementById('editEmail').value = authenticatedUser.email;
}

document.getElementById('viewProfileBtn').addEventListener('click', () => {
  const box = document.getElementById('profileSection');
  if (box.style.display === 'block') {
    box.style.display = 'none';
    document.getElementById('viewProfileBtn').innerText = 'View profile';
  } else {
    populateProfileUI();
    box.style.display = 'block';
    document.getElementById('viewProfileBtn').innerText = 'Hide profile';
  }
});

document.getElementById('saveProfileBtn').addEventListener('click', () => {
  const fn = document.getElementById('editFirstName').value.trim();
  const ln = document.getElementById('editLastName').value.trim();
  const ph = document.getElementById('editPhone').value.trim();
  const s = document.getElementById('editStatus');
  if (!fn || !ln || !ph) { s.innerText = 'Fill all fields.'; return; }
  s.innerText = 'Saved.';
});

document.getElementById('Btn').addEventListener('click', () => {
  const prompt = document.getElementById('Prompt').value.trim();
  const s = document.getElementById('Status');
  const token = sessionStorage.getItem('token');
  if (!token) { s.innerText = 'Not logged in.'; return; }
  if (!prompt) { s.innerText = 'Write something.'; return; }
  fetch('https://apg-api.vercel.app/api/requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ prompt })
  })
  .then(r => r.json())
  .then(d => { s.innerText = d.message; })
  .catch(() => { s.innerText = 'Network error.'; });
});

document.getElementById('challengeBtn').addEventListener('click', () => {
  const text = document.getElementById('challengeText').value.trim();
  const s = document.getElementById('challengeStatus');
  if (!authenticatedUser) { s.innerText = 'Not logged in.'; return; }
  if (!text) { s.innerText = 'Write something.'; return; }
  window.open('https://wa.me' + encodeURIComponent(authenticatedUser.email + '\n\n' + text), '_blank');
  s.innerText = 'Opened WhatsApp.';
});
  document.getElementById('challengeBtn').addEventListener('click', () => {
  const text = document.getElementById('challengeText').value.trim();
  const s = document.getElementById('challengeStatus');

  if (!authenticatedUser) {
    s.innerText = 'Not logged in.';
    return;
  }
  if (!text) {
    s.innerText = 'Write something.';
    return;
  }

  
  let phone = authenticatedUser.phone ? authenticatedUser.phone.trim() : "";
  if (!phone.startsWith("+20")) {
    if (/^0\d{9}$/.test(phone)) {
      phone = "+2" + phone.substring(1);
    } else {
      phone = "+2" + phone;
    }
  }

  const phoneRegex = /^\+20\d{10}$/;
  if (!phoneRegex.test(phone)) {
    s.innerText = "❌ Invalid phone number. Please update your profile.";
    return;
  }

  const message = `${authenticatedUser.firstName} ${authenticatedUser.lastName}\n${authenticatedUser.email}\n${phone}\n${text}`;

  const encodedMessage = encodeURIComponent(message);
  const whatsappUrl = `https://wa.me/201144604623?text=${encodedMessage}`;
  window.open(whatsappUrl, "_blank");

  s.innerText = 'Challenge info sent!';
});

</script>

</body>
</html>
